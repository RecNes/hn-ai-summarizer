{% extends "base.html" %}
{% block title %}Worker Logs{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-4" data-i18n="logs.pageTitle">Worker Logs</h1>
    <p class="text-gray-600 mb-4" data-i18n="logs.description">Real-time worker activity logs. Newest entries appear at the bottom.</p>
    
    <div id="worker-logs-container" class="bg-gray-50 dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
        <div id="worker-logs" class="p-4 space-y-1 font-mono text-sm max-h-[70vh] overflow-y-auto">
            <div class="text-center text-gray-400 py-8" data-i18n="logs.loading">Loading...</div>
        </div>
        
        <div id="logs-loading" class="hidden text-center text-gray-400 py-4 border-t border-gray-200 dark:border-gray-700">
            <span data-i18n="common.loading">Loading older logs...</span>
        </div>
        
        <div id="logs-end" class="hidden text-center text-gray-400 py-4 border-t border-gray-200 dark:border-gray-700">
            <span data-i18n="logs.end">No more logs.</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/logs.js"></script>
{% endblock %}
