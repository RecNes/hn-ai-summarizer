{% comment %}
Log Drawer — tüm sayfalardan erişilebilen AI aktivite log paneli.
Her sayfanın header'ında bir log butonu bulunur, sağdan kayan panel açılır.
{% endcomment %}
<div id="log-drawer-overlay" class="fixed inset-0 bg-black bg-opacity-30 z-40 hidden" onclick="toggleLogDrawer()"></div>

<div id="log-drawer" class="fixed top-0 right-0 h-full w-96 bg-white dark:bg-gray-800 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
    <!-- Drawer Header -->
    <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900">
        <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span data-i18n="log.title">AI Activity Log</span>
        </h3>
        <div class="flex items-center gap-2">
            <button id="log-refresh-btn" onclick="loadActivityLogs()" class="p-1.5 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400" title="Refresh logs">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
            <button onclick="toggleLogDrawer()" class="p-1.5 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Drawer Content -->
    <div class="flex-1 overflow-y-auto p-4 space-y-2" id="log-drawer-content">
        <div class="text-center text-gray-400 py-8" id="log-loading" data-i18n="log.loading">Loglar yükleniyor...</div>
    </div>

    <!-- Drawer Footer -->
    <div class="p-3 border-t border-gray-200 dark:border-gray-700 text-xs text-gray-400 text-center">
        <span data-i18n="log.autoRefresh">Otomatik yenileniyor (10sn)</span>
    </div>
</div>
</write_to_file>
