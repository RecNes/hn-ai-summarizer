<label class="block text-white-700 mb-2" for="ai_model">Model</label>
<!-- Custom searchable dropdown -->
<div id="model-dropdown" class="relative">
    <!-- Görünen seçim alanı (trigger) -->
    <button type="button" id="model-display"
            class="w-full p-2 border rounded text-left bg-white flex items-center justify-between disabled:opacity-50"
            disabled>
        <span id="model-display-text" class="text-gray-400">-- Önce sağlayıcı seçin --</span>
        <svg class="w-4 h-4 ml-2 fill-current text-gray-500" viewBox="0 0 20 20"><path d="M5 7l5 5 5-5z"/></svg>
    </button>
    <!-- Native select (value saklamak için, görünmez) -->
    <select id="ai_model" name="ai_model" class="hidden"></select>
    <!-- Açılır dropdown -->
    <div id="model-panel"
         class="hidden absolute z-50 w-full mt-1 bg-white border rounded shadow-lg max-h-64 flex flex-col">
        <input type="text" id="model-search"
               class="w-full p-2 border-b outline-none"
               placeholder="Model ara..." disabled>
        <div id="model-options" class="overflow-y-auto flex-1">
            <div class="p-2 text-gray-400 text-sm">-- Önce sağlayıcı seçin --</div>
        </div>
    </div>
</div>
<button id="refresh-models" type="button" class="btn-secondary mt-2 px-3 py-1 rounded text-sm disabled:opacity-50" disabled>
    Modelleri Yenile
</button>
<p id="model-status" class="text-sm text-gray-500 mt-1"></p>
