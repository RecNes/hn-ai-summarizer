<!-- AI Activity Log Panel (slide-up log drawer) -->
<div id="log-panel-overlay" class="fixed inset-0 bg-black bg-opacity-30 z-40 hidden"></div>

<div id="log-panel" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 shadow-2xl z-50 transform transition-transform duration-300 translate-y-full rounded-t-2xl max-h-[80vh] overflow-hidden" style="display: none;">
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 rounded-t-2xl">
        <h3 class="text-lg font-bold dark:text-white flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            AI Aktivite Log
        </h3>
        <div class="flex items-center gap-2">
            <button onclick="loadActivityLogs()" class="p-1.5 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400" title="Yenile">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
            <button id="log-panel-close-btn" class="p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Content -->
    <div id="log-panel-content" class="overflow-y-auto p-4 space-y-2" style="max-height: calc(80vh - 120px);">
        <div class="text-center text-gray-500 py-8">Yükleniyor...</div>
    </div>

    <!-- Footer -->
    <div class="p-2 border-t border-gray-200 dark:border-gray-700 text-xs text-gray-400 text-center bg-gray-50 dark:bg-gray-900">
        Otomatik yenileniyor (10sn)
    </div>
</div>

<!-- Activity Log Floating Button -->
<button id="log-panel-btn"
        class="fixed bottom-6 right-6 z-50 flex items-center gap-2 px-4 py-2.5 rounded-full bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 shadow-lg border border-gray-200 dark:border-gray-700 hover:shadow-xl hover:border-blue-400 dark:hover:border-blue-500 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-200 text-sm font-medium">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    Log
</button>
</write_to_file>
