<!-- AI Activity Log Panel -->
<div id="ai-panel-overlay" class="fixed inset-0 bg-black bg-opacity-30 z-40 hidden" onclick="toggleAiPanel()"></div>

<div id="ai-panel" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 shadow-2xl z-50 transform transition-transform duration-300 translate-y-full rounded-t-2xl max-h-[70vh] overflow-hidden" style="display: none;">
    <div class="flex justify-between items-center p-4 border-b dark:border-gray-700">
        <h3 class="text-lg font-bold dark:text-white">AI Aktivite Log</h3>
        <button onclick="toggleAiPanel()" class="p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
    <div id="ai-panel-content" class="overflow-y-auto p-4" style="max-height: calc(70vh - 60px);">
        <div class="text-center text-gray-500 py-8">Yükleniyor...</div>
    </div>
</div>

<!-- AI Floating Button -->
<button id="ai-panel-btn" onclick="toggleAiPanel()" 
        class="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-200 flex items-center justify-center font-bold text-lg">
    AI
</button>
