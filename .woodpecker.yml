when:
  event: [push, pull_request]
  branch: [main, master]

steps:
  build-and-push:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_REGISTRY:
        from_secret: DOCKER_REGISTRY
    commands:
      - docker build -t "$DOCKER_REGISTRY/hn-reader:${CI_COMMIT_SHA:0:8}" -t "$DOCKER_REGISTRY/hn-reader:latest" .
      - docker push "$DOCKER_REGISTRY/hn-reader:${CI_COMMIT_SHA:0:8}"
      - docker push "$DOCKER_REGISTRY/hn-reader:latest"
    when:
      event: [push]
      branch: [main, master]

  test:
    image: python:3.11-slim
    commands:
      - pip install --no-cache-dir -e ".[dev]"
      - pytest tests/ -v --tb=short
    when:
      event: [push, pull_request]

  deploy:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HN_READER_ENV_FILE:
        from_secret: HN_READER_ENV_FILE
      DOCKER_REGISTRY:
        from_secret: DOCKER_REGISTRY
    commands:
      - printf '%s' "$HN_READER_ENV_FILE" > .env
      - docker compose pull
      - docker compose up -d --remove-orphans --no-build
      - docker image prune -af
    when:
      event: [push]
      branch: [main, master]
      status: [success]