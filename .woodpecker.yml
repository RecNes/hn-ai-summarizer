when:
  event: [push, pull_request]
  branch: [main, master]

steps:
  debug-secret:
    image: alpine:3
    environment:
      DOCKER_REGISTRY:
        from_secret: DOCKER_REGISTRY
    commands:
      - env | sort
      - test -n "$DOCKER_REGISTRY"
  
  build-and-push:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_REGISTRY:
        from_secret: DOCKER_REGISTRY
    commands:
      - echo "registry=[$DOCKER_REGISTRY]"
      - echo "sha=[$CI_COMMIT_SHA]"
      - docker build -t ${DOCKER_REGISTRY}/hn-reader:${CI_COMMIT_SHA:0:8} -t ${DOCKER_REGISTRY}/hn-reader:latest .
      - docker push ${DOCKER_REGISTRY}/hn-reader:${CI_COMMIT_SHA:0:8}
      - docker push ${DOCKER_REGISTRY}/hn-reader:latest
    when:
      event: [push]
      branch: [main, master]

  test:
    image: python:3.11-slim
    commands:
      - pip install --no-cache-dir -e ".[dev]"
      - pytest tests/ -v --tb=short
    when:
      event: [push, pull_request]

  deploy:
    image: alpine:3
    environment:
      DEPLOY_HOST:
        from_secret: DEPLOY_HOST
      DEPLOY_USER:
        from_secret: DEPLOY_USER
      DEPLOY_KEY:
        from_secret: DEPLOY_KEY
      HN_READER_ENV_FILE:
        from_secret: HN_READER_ENV_FILE
    commands:
      - apk add --no-cache openssh-client git
      - mkdir -p ~/.ssh
      - echo "${DEPLOY_KEY}" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
      - >
        ssh "${DEPLOY_USER}@${DEPLOY_HOST}"
        "
        set -e
        cd /app/hn-reader
        git pull
        echo '${HN_READER_ENV_FILE}' > .env
        docker compose pull
        docker compose up -d --remove-orphans --no-build
        docker image prune -af
        "
    when:
      event: [push]
      branch: [main, master]
      status: [success]