when:
  event: [push, pull_request]
  branch: [main, master]

steps:
  notify-start:
    name: Send Build Start Notification
    image: appleboy/drone-telegram
    settings:
      token:
        from_secret: TELEGRAM_TOKEN
      to:
        from_secret: TELEGRAM_USERID
      format: markdown
      message: |
        👷‍♂️ *Woodpecker Builder*
        
        `${CI_REPO_NAME}/${CI_COMMIT_BRANCH}` branch'i için *#${CI_PIPELINE_NUMBER}* numaralı deployment başlatıldı... 
        
        👤 Commit Author: _${CI_COMMIT_AUTHOR}_
        📖 Commit Mesajı:
        ```
        ${CI_COMMIT_MESSAGE}
        ```
        [🔗 Detaylar](${CI_PIPELINE_URL})

  build-and-push:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_REGISTRY:
        from_secret: DOCKER_REGISTRY
    commands:
      - docker build -t "$DOCKER_REGISTRY/hn-reader:${CI_COMMIT_SHA:0:8}" -t "$DOCKER_REGISTRY/hn-reader:latest" .
      - docker push "$DOCKER_REGISTRY/hn-reader:${CI_COMMIT_SHA:0:8}"
      - docker push "$DOCKER_REGISTRY/hn-reader:latest"
    when:
      event: [push]
      branch: [main, master]

  test:
    image: python:3.11-slim
    commands:
      - pip install --no-cache-dir -e ".[dev]"
      - pytest tests/ -v --tb=short
    when:
      event: [pull_request]

  deploy:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HN_READER_ENV_FILE:
        from_secret: HN_READER_ENV_FILE
      DOCKER_REGISTRY:
        from_secret: DOCKER_REGISTRY
    commands:
      - printf '%s' "$HN_READER_ENV_FILE" > /tmp/.env
      - cp /tmp/.env .env 2>/dev/null || true
      - docker compose --env-file /tmp/.env pull
      - docker compose --env-file /tmp/.env up -d --remove-orphans --no-build
      - docker image prune -af
    when:
      event: [push]
      branch: [main, master]
      status: [success]

  notify-success:
    name: Send Build Success Notification
    image: appleboy/drone-telegram
    settings:
      token:
        from_secret: TELEGRAM_TOKEN
      to:
        from_secret: TELEGRAM_USERID
      format: html
      message: | 
        ✅ <b>{{repo.name}}</b> Build <b>#{{build.number}}</b> Başarılı!
        
        <a href='{{build.link}}'>🔗 Detaylar</a>
    when:
      status: [ success ]

  notify-failure:
    name: Send Build Fail Notification
    image: appleboy/drone-telegram
    settings:
      token:
        from_secret: TELEGRAM_TOKEN
      to:
        from_secret: TELEGRAM_USERID
      format: html
      message: | 
        ⚠️ <b>{{repo.name}}</b> Build <b>#{{build.number}}</b> Hata Aldı!
        
        <a href='{{build.link}}'>🔗 Detaylar</a>
    when:
      status: [ failure ]
