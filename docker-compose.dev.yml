services:
  db:
    profiles: ["internal"]
    image: postgres:13
    environment:
      POSTGRES_DB: hn_ai_summerizer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["internal"]
    image: redis:6-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    profiles: ["internal"]
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_HOST=db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=hn_ai_summerizer_db
      - REDIS_URL=redis://redis:6379/0
      - DEVELOPMENT=True
      - DB_ECHO=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  worker:
    profiles: ["internal"]
    build: .
    environment:
      - DATABASE_HOST=db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=hn_ai_summerizer_db
      - REDIS_URL=redis://redis:6379/0
      - DEVELOPMENT=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: arq app.tasks.worker.WorkerSettings

  scheduler:
    profiles: ["internal"]
    build: .
    environment:
      - DATABASE_HOST=db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=hn_ai_summerizer_db
      - REDIS_URL=redis://redis:6379/0
      - DEVELOPMENT=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m app.cli scheduler

volumes:
  postgres_data_dev: