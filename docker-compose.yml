services:
  # ============================================================
  # Internal servisler (profile ile kontrol edilir)
  #   docker compose --profile internal up   → db/redis dahil (local development)
  #   docker compose up                      → db/redis hariç (external bağlantı)
  # ============================================================

  db:
    profiles: ["internal"]
    image: postgres:13
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-hn_ai_summerizer_db}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    profiles: ["internal"]
    image: redis:6-alpine
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # Uygulama servisleri
  # ============================================================

  app:
    build: .
    image: ${DOCKER_REGISTRY}/hn-reader:latest
    container_name: hn-reader-app
    network_mode: host
    env_file:
      - .env
    environment:
      - DATABASE_HOST=${DATABASE_HOST:-localhost}
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_NAME=${DATABASE_NAME:-hn_ai_summerizer_db}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEVELOPMENT=${DEVELOPMENT:-False}
      - DB_ECHO=${DB_ECHO:-False}
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    restart: unless-stopped

  worker:
    build: .
    image: ${DOCKER_REGISTRY}/hn-reader:latest
    container_name: hn-reader-worker
    network_mode: host
    env_file:
      - .env
    environment:
      - DATABASE_HOST=${DATABASE_HOST:-localhost}
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_NAME=${DATABASE_NAME:-hn_ai_summerizer_db}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEVELOPMENT=${DEVELOPMENT:-False}
    command: arq app.tasks.worker.WorkerSettings
    restart: unless-stopped

  scheduler:
    build: .
    image: ${DOCKER_REGISTRY}/hn-reader:latest
    container_name: hn-reader-scheduler
    network_mode: host
    env_file:
      - .env
    environment:
      - DATABASE_HOST=${DATABASE_HOST:-localhost}
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_NAME=${DATABASE_NAME:-hn_ai_summerizer_db}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEVELOPMENT=${DEVELOPMENT:-False}
    command: python -m app.cli scheduler
    restart: unless-stopped

volumes:
  postgres_data:
    name: hn_reader_postgres_data
  redis_data:
    name: hn_reader_redis_data